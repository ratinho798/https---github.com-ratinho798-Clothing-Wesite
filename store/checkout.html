<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - S1NTA Clothing Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-box {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            color: #000;
            transition: background 0.3s, color 0.3s;
        }

        .checkout-box h1 {
            margin-bottom: 10px;
        }

        .checkout-box p {
            margin-bottom: 20px;
        }

        .checkout-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            color: inherit;
        }

        .checkout-table th,
        .checkout-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #ccc;
            font-size: 1rem;
        }

        .checkout-table th {
            font-weight: bold;
        }

        .checkout-table th:first-child,
        .checkout-table td:first-child {
            text-align: left;
        }

        .checkout-table th:nth-child(2),
        .checkout-table td:nth-child(2),
        .checkout-table th:nth-child(3),
        .checkout-table td:nth-child(3) {
            text-align: center;
        }

        .total {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .status-message {
            margin: 15px 0;
            font-weight: bold;
            min-height: 24px;
        }

        .success-message {
            color: limegreen;
        }

        .error-message {
            color: red;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #c7db14;
            color: black;
            font-size: 1rem;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        body.dark-mode .checkout-box {
            background: #1a1a1a;
            color: #f0f0f0;
        }

        body.dark-mode .checkout-table th,
        body.dark-mode .checkout-table td {
            border-bottom: 1px solid #444;
        }

        @media (max-width: 600px) {
            .checkout-box {
                margin: 20px;
                padding: 20px;
            }

            .checkout-table th,
            .checkout-table td {
                padding: 10px 8px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">S1NTA Clothing Store</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
    </nav>

    <button id="darkModeToggle">🌙</button>
</header>

<main class="container fade-in" id="checkoutContainer">
    <!-- Checkout content will be inserted here -->
</main>

<footer class="footer">
    <p>&copy; S1NTA Clothing Store</p>
</footer>

<script
    type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>

<script>
    const darkModeToggle = document.getElementById("darkModeToggle");

    function applySavedTheme() {
        const savedTheme = localStorage.getItem("theme");

        if (savedTheme === "dark") {
            document.body.classList.add("dark-mode");
            darkModeToggle.textContent = "☀️";
        } else {
            document.body.classList.remove("dark-mode");
            darkModeToggle.textContent = "🌙";
        }
    }

    applySavedTheme();

    darkModeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");

        const isDark = document.body.classList.contains("dark-mode");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        darkModeToggle.textContent = isDark ? "☀️" : "🌙";
    });

    emailjs.init({
        publicKey: "OMcw_Rrcm3XZo8J7w"
    });

    function clearCart() {
        localStorage.removeItem("cart");
    }

    async function sendOrderEmail(cart, total) {
        const orderLines = cart
            .map(item => `${item.name} x ${item.quantity} - NAD ${(item.price * item.quantity).toFixed(2)}`)
            .join("\n");

        const templateParams = {
            supplier_email: "hamutenyaabraham27@gmail.com",
            store_name: "S1NTA Clothing Store",
            subject: "New Order Received",
            order_items: orderLines,
            order_total: `NAD ${total.toFixed(2)}`,
            order_count: cart.length,
            message: `A new purchase was completed.\n\nItems:\n${orderLines}\n\nTotal: NAD ${total.toFixed(2)}`
        };

        return emailjs.send("S1NTA", "template_x9b1fjb", templateParams);
    }

    function displayCheckout() {
        const container = document.getElementById("checkoutContainer");
        const cart = JSON.parse(localStorage.getItem("cart")) || [];

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="checkout-box">
                    <h1>Your Cart is Empty 😔</h1>
                    <p>Looks like you haven't added anything yet.</p>
                    <button onclick="window.location.href='index.html'">Go Shopping</button>
                </div>
            `;
            return;
        }

        let itemsHTML = `
            <table class="checkout-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
        `;

        let total = 0;

        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;

            itemsHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>x ${item.quantity}</td>
                    <td>NAD ${itemTotal.toFixed(2)}</td>
                </tr>
            `;
        });

        itemsHTML += `
                </tbody>
            </table>
        `;

        container.innerHTML = `
            <div class="checkout-box">
                <h1>Wollurr, Checkout Successful 🎉</h1>
                <p>Thank you for shopping with us!</p>
                ${itemsHTML}
                <p class="total">Total: NAD ${total.toFixed(2)}</p>
                <p id="emailStatus" class="status-message"></p>
                <button id="returnHomeBtn">Return Home</button>
            </div>
        `;

        document.getElementById("returnHomeBtn").addEventListener("click", async () => {
            const button = document.getElementById("returnHomeBtn");
            const emailStatus = document.getElementById("emailStatus");

            button.disabled = true;
            button.textContent = "Sending order...";
            emailStatus.textContent = "";
            emailStatus.className = "status-message";

            try {
                await sendOrderEmail(cart, total);

                emailStatus.textContent = "✅ Order email sent successfully!";
                emailStatus.classList.add("success-message");

                setTimeout(() => {
                    clearCart();
                    window.location.href = "index.html";
                }, 1500);

            } catch (error) {
                console.error("Email sending failed:", error);
                emailStatus.textContent = "❌ Order completed, but the supplier email could not be sent.";
                emailStatus.classList.add("error-message");

                button.disabled = false;
                button.textContent = "Return Home";
            }
        });
    }

    displayCheckout();
</script>

</body>
</html>
