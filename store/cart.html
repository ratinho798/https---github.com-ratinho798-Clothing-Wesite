<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - S1NTA Clothing Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="logo">S1NTA Clothing Store</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
        
    </nav>
    <button id="darkModeToggle">🌙</button>
</header>

<main class="container fade-in">
    <h1>Your Cart</h1>

    <table id="cartTable">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cartBody"></tbody>
    </table>

    <h2 id="total">Total: NAD 0.00</h2>

    <div class="cart-buttons">
        <a class="btn" href="checkout.html">Checkout</a>
        <a class="btn" href="index.html">Continue Shopping</a>
    </div>
</main>

<footer class="footer">
    <p>&copy; S1nta Clothing Store</p>
</footer>

<script>
    const darkModeToggle = document.getElementById("darkModeToggle");

    function applySavedTheme() {
        const savedTheme = localStorage.getItem("theme");

        if (savedTheme === "dark") {
            document.body.classList.add("dark-mode");
            darkModeToggle.textContent = "☀️";
        } else {
            document.body.classList.remove("dark-mode");
            darkModeToggle.textContent = "🌙";
        }
    }

    applySavedTheme();

    darkModeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");

        const isDark = document.body.classList.contains("dark-mode");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        darkModeToggle.textContent = isDark ? "☀️" : "🌙";
    });

    function loadCart() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const cartBody = document.getElementById("cartBody");
        const totalElement = document.getElementById("total");

        cartBody.innerHTML = "";
        let total = 0;

        if (cart.length === 0) {
            cartBody.innerHTML = `
                <tr>
                    <td colspan="5">Your cart is empty.</td>
                </tr>
            `;
            totalElement.textContent = "Total: NAD 0.00";
            return;
        }

        cart.forEach((item, index) => {
            const subtotal = item.price * item.quantity;
            total += subtotal;

            cartBody.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>NAD ${item.price.toFixed(2)}</td>
                    <td>
                        <button onclick="decreaseQuantity(${index})">-</button>
                        ${item.quantity}
                        <button onclick="increaseQuantity(${index})">+</button>
                    </td>
                    <td>NAD ${subtotal.toFixed(2)}</td>
                    <td><button onclick="removeItem(${index})">Remove</button></td>
                </tr>
            `;
        });

        totalElement.textContent = `Total: NAD ${total.toFixed(2)}`;
    }

    function increaseQuantity(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart[index].quantity++;
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
    }

    function decreaseQuantity(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        if (cart[index].quantity > 1) {
            cart[index].quantity--;
        } else {
            cart.splice(index, 1);
        }

        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
    }

    loadCart();
</script>

<style>
    .cart-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
    }

    #cartTable td[colspan="5"] {
        text-align: center;
        padding: 20px;
    }
</style>

</body>
</html>
